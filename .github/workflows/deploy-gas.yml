name: Deploy GAS

on:
  push:
    branches:
      - main
    paths:
      - "gas/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check GAS source
        id: gas-source
        working-directory: gas
        run: |
          if ! find . -maxdepth 1 -name "*.gs" | grep -q .; then
            echo "No GAS .gs files found in gas/. Skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Validate clasp credentials
        if: steps.gas-source.outputs.deploy == 'true'
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "Repository secret CLASPRC_JSON is required."
            echo "Create it from a valid local ~/.clasprc.json generated by clasp login."
            exit 1
          fi

      - name: Install clasp
        if: steps.gas-source.outputs.deploy == 'true'
        run: npm install --global @google/clasp

      - name: Write clasp credentials
        if: steps.gas-source.outputs.deploy == 'true'
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Push to Apps Script
        if: steps.gas-source.outputs.deploy == 'true'
        working-directory: gas
        run: clasp push --force
